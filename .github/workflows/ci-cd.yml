name: Rust CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  check-and-test:
    name: Code Quality & Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install LLVM (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          sudo ln -s /usr/lib/llvm-22/bin/llvm-config /usr/bin/llvm-config
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      - name: Install LLVM (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm@22
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm@22)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@22)/bin" >> $GITHUB_PATH
      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/LLVM-22.1.6-win64.exe"
          Invoke-WebRequest -Uri $llvmUrl -OutFile LLVM.exe -UseBasicParsing
          .\LLVM.exe /S
          $llvmRoot = "C:\Program Files\LLVM"
          echo "LLVM_SYS_221_PREFIX=$llvmRoot" >> $env:GITHUB_ENV
          echo "$llvmRoot\bin;$llvmRoot\lib;$llvmRoot\include" >> $env:GITHUB_PATH
        shell: pwsh
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-
      - name: Fetch dependencies
        run: cargo fetch
      - name: Auto format code and commit (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo fmt --all
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "chore: auto format code via CI"
            git push
          fi
      - name: Check code formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy lints
        run: cargo clippy --all-targets --all-features
      - name: Run tests
        run: cargo test --verbose