# ============================================================
# Coconut Compiler CI/CD 工作流
# 功能：自动化代码质量检查与测试
# 触发条件：
#   - 推送到 main 分支
#   - 创建或更新 Pull Request
# ============================================================

name: Rust CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ----------------------------------------------------------
# 环境变量配置
# ----------------------------------------------------------
env:
  CARGO_TERM_COLOR: always

jobs:
  # ========================================================
  # 任务一：代码质量检查与测试
  # ========================================================
  check-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 步骤 1：检出代码仓库
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 步骤 2：配置 Rust 工具链
      # 安装指定版本的 Rust 编译器及相关工具
      # ---------------------------
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ---------------------------
      # 步骤 3：缓存 Cargo 依赖与编译产物
      # 加速后续的依赖安装和编译过程
      # ---------------------------
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ---------------------------
      # 步骤 4：安装项目依赖
      # 通过 cargo fetch 预下载所有依赖
      # ---------------------------
      - name: Fetch dependencies
        run: cargo fetch

      # ---------------------------
      # 步骤 5：代码格式化检查
      # 确保代码符合 Rust 标准格式规范
      # ---------------------------
      - name: Check code formatting
        run: cargo fmt --all -- --check
        continue-on-error: false # 格式不通过直接失败

      # ---------------------------
      # 步骤 6：Clippy 静态分析
      # 检测潜在 bug、性能问题和不规范代码
      # ---------------------------
      - name: Run Clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ---------------------------
      # 步骤 7：执行单元测试与集成测试
      # 运行项目中定义的所有测试用例
      # ---------------------------
      - name: Run tests
        run: cargo test --verbose

      # ---------------------------
      # 步骤 8：缓存后处理（可选但推荐）
      # ---------------------------
      - name: Post Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        if: always()
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}