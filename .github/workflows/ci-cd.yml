name: Rust CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # 给 llvm-sys 指定 LLVM 版本前缀（对应 llvm-sys 221.0.1）
  LLVM_SYS_221_PREFIX: /usr/lib/llvm-22

jobs:
  check-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------
      # 关键：安装 LLVM 22（匹配 llvm-sys 221）
      # ---------------------------
      - name: Install LLVM 22
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          # 确认安装路径
          echo "LLVM installed at: $(which llvm-config-22)"
          sudo ln -s /usr/lib/llvm-22/bin/llvm-config /usr/bin/llvm-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fetch dependencies
        run: cargo fetch

      # 自动格式化并提交
      - name: Auto format code and commit
        run: |
          cargo fmt --all
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "chore: auto format code via CI"
            git push
          fi

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose
