# ============================================================
# Coconut Compiler CI/CD 工作流
# 功能：自动化代码质量检查与测试（含自动格式化）
# 触发条件：
#   - 推送到 main 分支
#   - 创建或更新 Pull Request
# ============================================================

name: Rust CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须给 CI 写权限，才能提交格式化后的代码

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 升级到 v4，解决 Node.js 20 警告
        with:
          fetch-depth: 0 # 拉取完整历史，确保能正常提交

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4 # 升级到 v4，解决 Node.js 20 警告
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fetch dependencies
        run: cargo fetch

      # ---------------------------
      # 新增：自动格式化代码并提交
      # ---------------------------
      - name: Auto format code and commit
        run: |
          # 运行 rustfmt 自动格式化所有代码
          cargo fmt --all
          
          # 配置 CI 的 Git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有文件被修改
          if git diff --quiet; then
            echo "No formatting changes needed"
          else
            # 提交并推送格式化后的代码
            git add .
            git commit -m "chore: auto format code via CI"
            git push
          fi

      # ---------------------------
      # 格式化后的二次检查（确保万无一失）
      # ---------------------------
      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose
